<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juz Amma Reverse</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar: List of Surahs -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>Juz Amma Reverse</h1>
                <p>An-Nas to An-Naba</p>
            </div>
            <div class="reciter-selection">
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="background">Background</button>
                    <button class="filter-btn" data-filter="murajaah">Murajaah</button>
                </div>
                <label for="reciter-select">Reciter:</label>
                <select id="reciter-select">
                    <option value="" disabled selected>Loading reciters...</option>
                </select>
            </div>
            <div class="surah-list" id="surah-list">
                <!-- Surahs will be dynamically inserted here -->
            </div>
        </aside>

        <!-- Main Content: Verses & Audio -->
        <main class="main-content">
            <header class="main-header">
                <h2 id="current-surah-title">Select a Surah</h2>
                <p id="current-surah-subtitle">to begin reading and listening</p>
            </header>

            <div class="verses-container" id="verses-container">
                <div class="welcome-message">
                    Welcome to Juz Amma Reverse! <br> Please select a Surah from the sidebar.
                </div>
            </div>

            <div class="audio-player-container glassmorphism" id="audio-player-container" style="display: none;">
                <div class="player-info">
                    <span id="now-playing-title">Playing: None</span>
                </div>
                <div class="player-controls-row">
                    <button class="player-btn" id="shuffle-toggle" title="Shuffle Reciters" aria-label="Shuffle Reciters" aria-pressed="false">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="16 3 21 3 21 8"></polyline>
                            <line x1="4" y1="20" x2="21" y2="3"></line>
                            <polyline points="21 16 21 21 16 21"></polyline>
                            <line x1="15" y1="15" x2="21" y2="21"></line>
                            <line x1="4" y1="4" x2="9" y2="9"></line>
                        </svg>
                    </button>
                    <audio id="audio-player" controls>
                        Your browser does not support the audio element.
                    </audio>
                    <button class="player-btn" id="loop-toggle" title="Loop Reciter List" aria-label="Loop Reciter List" aria-pressed="false">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="17 1 21 5 17 9"></polyline>
                            <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
                            <polyline points="7 23 3 19 7 15"></polyline>
                            <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
